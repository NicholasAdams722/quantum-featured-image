<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantum Featured Image Generator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a2540'/%3E%3Ctext x='32' y='44' font-family='Inter,Helvetica,Arial,sans-serif' font-size='38' font-weight='700' fill='%235e7ec9' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1a2540; --navy-2:#212d4d; --panel:#212c4b; --field:#16203a;
    --line:#33406a; --accent:#4866B3; --accent-2:#5e7ec9; --text:#eaf0fb;
    --muted:#94a3c4; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 70% -10%, #2a3a63 0%, #131c31 55%, #0f1626 100%);
    color:var(--text); font-family:Inter,'Helvetica Neue',Arial,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100%;
  }
  .app{max-width:1180px;margin:0 auto;padding:28px 22px 60px;display:grid;grid-template-columns:340px 1fr;gap:26px;align-items:start}
  @media (max-width:880px){ .app{grid-template-columns:1fr} }

  .panel{background:linear-gradient(180deg,var(--panel),var(--navy));border:1px solid var(--line);border-radius:var(--radius);padding:22px;position:sticky;top:24px}
  @media (max-width:880px){ .panel{position:static} }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 14px var(--accent-2)}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.2px;margin:0}
  .sub{font-size:12px;color:var(--muted);margin:0 0 18px}

  .field{margin-bottom:16px}
  .field > label{display:block;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  input[type=text], textarea{
    width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;color:var(--text);
    font-family:inherit;font-size:14px;padding:11px 12px;resize:vertical;line-height:1.4
  }
  input[type=text]:focus, textarea:focus{outline:none;border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(94,126,201,.18)}
  textarea{min-height:60px}

  .seg{display:flex;flex-wrap:wrap;gap:7px}
  .seg button{
    flex:1 1 auto;background:var(--field);border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 10px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap
  }
  .seg button:hover{border-color:var(--accent-2);color:var(--text)}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}

  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:10px}
  .switch{position:relative;display:inline-block;width:42px;height:24px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--field);border:1px solid var(--line);border-radius:24px;cursor:pointer;transition:.18s}
  .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.18s}
  .switch input:checked + .slider{background:var(--accent);border-color:var(--accent)}
  .switch input:checked + .slider:before{transform:translateX(18px);background:#fff}
  .row label{font-size:13px;color:var(--text);font-weight:500}

  .download{width:100%;margin-top:8px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;padding:13px;cursor:pointer;transition:.15s}
  .download:hover{background:var(--accent-2)}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}

  .stage{display:flex;flex-direction:column;gap:12px}
  .frame{background:#0c1322;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
  canvas{width:100%;height:auto;display:block;border-radius:8px}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:0 4px}
  .imgrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .uploadbtn{display:inline-block;background:var(--field);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:600;padding:9px 12px;border-radius:9px;cursor:pointer;transition:.15s}
  .uploadbtn:hover{border-color:var(--accent-2)}
  .removebtn{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;cursor:pointer;transition:.15s}
  .removebtn:hover{color:var(--text);border-color:var(--accent-2)}
  .washlabel{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
</style>
</head>
<body>
<div class="app">

  <div class="panel">
    <div class="brand"><span class="dot"></span><h1>Featured Image Generator</h1></div>
    <p class="sub">Quantum Letter post artwork, standardized.</p>

    <div class="field">
      <label>Post type</label>
      <div class="seg" id="presets">
        <button data-showtype="false" class="on">Quantum Letter</button>
        <button data-eyebrow="QUANTUM UPDATE" data-showtype="true">Quantum Update</button>
        <button data-eyebrow="INVESTOR UPDATE" data-showtype="true">Investor Update</button>
        <button data-eyebrow="WEEKEND INVESTOR UPDATE" data-showtype="true">Weekend Update</button>
      </div>
    </div>

    <div class="field" id="eyebrowField" style="display:none">
      <label>Type label</label>
      <input type="text" id="eyebrow" value="QUANTUM UPDATE">
    </div>

    <div class="field">
      <label>Date</label>
      <input type="text" id="date" value="">
      <div class="row">
        <label for="showDate">Show date</label>
        <label class="switch"><input type="checkbox" id="showDate" checked><span class="slider"></span></label>
      </div>
    </div>

    <div class="field">
      <label>Title</label>
      <textarea id="title">Title</textarea>
      <div class="row">
        <label for="showTitle">Show title line</label>
        <label class="switch"><input type="checkbox" id="showTitle" checked><span class="slider"></span></label>
      </div>
      <div style="margin-top:14px">
        <div class="washlabel"><span>Title size</span><span id="titleSizeVal">100%</span></div>
        <input type="range" id="titleSize" min="60" max="140" value="100">
      </div>
    </div>

    <div class="field">
      <label>Companion line</label>
      <textarea id="companion"></textarea>
      <div class="row">
        <label for="showCompanion">Show companion line</label>
        <label class="switch"><input type="checkbox" id="showCompanion"><span class="slider"></span></label>
      </div>
      <div style="margin-top:14px">
        <div class="washlabel"><span>Companion size</span><span id="companionSizeVal">100%</span></div>
        <input type="range" id="companionSize" min="60" max="140" value="100">
      </div>
    </div>

    <div class="field">
      <label>Theme</label>
      <div class="seg" id="theme">
        <button data-theme="blue" class="on">Blue</button>
        <button data-theme="green">Green</button>
      </div>
    </div>

    <div class="field">
      <label>Background</label>
      <div class="seg" id="bg">
        <button data-bg="smooth" class="on">Smooth</button>
        <button data-bg="textured">Textured</button>
      </div>
    </div>

    <div class="field">
      <label>Background image</label>
      <div class="imgrow">
        <label class="uploadbtn" for="bgImgInput">Upload image</label>
        <input type="file" id="bgImgInput" accept="image/*" hidden>
        <button id="bgImgRemove" class="removebtn" style="display:none">Remove</button>
      </div>
      <div id="washWrap" style="display:none;margin-top:14px">
        <div class="washlabel"><span>Wash</span><span id="washVal">70%</span></div>
        <input type="range" id="wash" min="40" max="100" value="70">
      </div>
    </div>

    <div class="field">
      <label>Size</label>
      <div class="seg" id="size">
        <button data-w="1920" data-h="1080" class="on">Feature 1920&times;1080</button>
        <button data-w="1200" data-h="630">Social 1200&times;630</button>
      </div>
    </div>

    <button class="download" id="download">Download PNG</button>
    <p class="hint">Renders at full resolution. The text never changes the brand frame, only the words. Logo and gradient are fixed.</p>
  </div>

  <div class="stage">
    <div class="frame"><canvas id="canvas" width="1920" height="1080"></canvas></div>
    <div class="meta"><span id="dim">1920 &times; 1080</span><span id="fname">the-ethereum-market-stack-june-2026.png</span></div>
  </div>

</div>

const LOGO_RATIO = 700/154; // width/height of the white wordmark

function roundedFit(text, weight, basePx, maxWidth){
  let px = basePx;
  ctx.font = `${weight} ${px}px Inter, 'Helvetica Neue', Arial, sans-serif`;
  while(ctx.measureText(text).width > maxWidth && px > 10){
    px -= 1;
    ctx.font = `${weight} ${px}px Inter, 'Helvetica Neue', Arial, sans-serif`;
  }
  return px;
}

function wrap(text, maxWidth){
  const words = text.split(/\s+/).filter(Boolean);
  const lines=[]; let line="";
  for(const w of words){
    const test = line ? line+" "+w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line=w; }
    else line=test;
  }
  if(line) lines.push(line);
  return lines;
}

function drawTexture(W,H){
  ctx.save();
  ctx.globalCompositeOperation='soft-light';
  ctx.translate(W*0.5,H*0.5); ctx.rotate(-0.32); ctx.translate(-W*0.5,-H*0.5);
  const bands=5, bw=W*0.9/bands;
  for(let i=0;i<bands;i++){
    const x=i*bw - W*0.1;
    const g=ctx.createLinearGradient(x,0,x+bw,0);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(0.5,`rgba(255,255,255,${i%2?0.05:0.085})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.fillRect(x,-H*0.5,bw,H*2);
  }
  ctx.restore();
}

function render(){
  if(!logoReady) return;
  const W=state.w, H=state.h;
  if(canvas.width!==W || canvas.height!==H){ canvas.width=W; canvas.height=H; }

  const theme = THEMES[state.theme] || THEMES.blue;

  // base: optional washed-out background image, else brand gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  theme.grad.forEach(s=>grad.addColorStop(s[0], s[1]));
  if(bgImg){
    const ir=bgImg.width/bgImg.height, cr=W/H;
    let dw,dh; if(ir>cr){ dh=H; dw=H*ir; } else { dw=W; dh=W/ir; }
    if('filter' in ctx) ctx.filter='saturate(0.35) brightness(0.95)';
    ctx.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh);
    if('filter' in ctx) ctx.filter='none';
    ctx.globalAlpha=state.bgWash;
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  }

  if(state.bg==='textured') drawTexture(W,H);

  // soft depth glow
  const gl=theme.glow;
  const rg=ctx.createRadialGradient(W*gl.x,H*gl.y,0,W*gl.x,H*gl.y,W*gl.r);
  rg.addColorStop(0,gl.color); rg.addColorStop(1,gl.color.replace(/[\d.]+\)$/,'0)'));
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  const maxW = W*0.86;
  const hasTitle = state.showTitle && state.title.trim().length>0;
  const hasType  = state.showType;            // this post type carries a label
  const hasDate  = state.showDate && state.date.trim().length>0;
  const logoY = H*0.85;

  if(hasTitle){
    // ---- TITLE IS THE HERO ----
    let tpx = H*0.104*state.titleScale;
    ctx.font=`400 ${tpx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
    let lines = wrap(state.title.trim(), maxW);
    while(lines.length>3 && tpx>22){
      tpx-=2; ctx.font=`400 ${tpx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      lines = wrap(state.title.trim(), maxW);
    }
    const lh = tpx*1.16;
    const titleH = lines.length*lh;

    const hasCompanion = state.showCompanion && state.companion.trim().length>0;
    let cLines=[], cPx=0, cLh=0, cGap=0, cBlockH=0;
    if(hasCompanion){
      let titleWidth = 0;
      for(const ln of lines){
        const w = ctx.measureText(ln).width;
        if(w > titleWidth) titleWidth = w;
      }
      const cMaxW = Math.min(maxW, Math.max(titleWidth, W*0.5));
      cPx = tpx*0.5*state.companionScale;
      ctx.font=`300 ${cPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      cLines = wrap(state.companion.trim(), cMaxW);
      if(cLines.length>2) cLines = cLines.slice(0,2);
      cLh = cPx*1.25;
      cGap = tpx*0.45;
      cBlockH = cGap + cLines.length*cLh;
    }

    const blockH = titleH + cBlockH;
    const titleCenter = H*0.45;
    const titleTop = titleCenter - blockH/2;
    const titleBottom = titleTop + titleH;

    // EYEBROW — the post type, small and tracked, above the hero
    if(hasType && state.eyebrow.trim()){
      const eb = state.eyebrow.toUpperCase();
      if('letterSpacing' in ctx) ctx.letterSpacing = Math.round(H*0.0028)+'px';
      const ebPx = roundedFit(eb, 700, H*0.040, maxW);
      ctx.font=`700 ${ebPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.82)';
      ctx.fillText(eb, W/2, titleTop - H*0.052);
      if('letterSpacing' in ctx) ctx.letterSpacing='0px';
    }

    // TITLE — the hero
    ctx.font=`400 ${tpx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
    ctx.fillStyle='#FFFFFF';
    let y = titleTop + lh/2;
    lines.forEach(ln=>{ ctx.fillText(ln, W/2, y); y+=lh; });

    // COMPANION LINE — quiet support below the title
    let companionBottom = titleBottom;
    if(hasCompanion){
      ctx.font=`300 ${cPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.78)';
      let cy = titleBottom + cGap + cLh/2;
      cLines.forEach(ln=>{ ctx.fillText(ln, W/2, cy); cy+=cLh; });
      companionBottom = titleBottom + cGap + cLines.length*cLh;
    }

    // DATE — quiet caption below the hero
    if(hasDate){
      const dPx = roundedFit(state.date, 300, H*0.048, maxW);
      ctx.font=`300 ${dPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.78)';
      ctx.fillText(state.date, W/2, companionBottom + H*0.055);
    }

  } else if(hasType){
    // ---- NO TITLE: the post type is the hero (periodic update) ----
    const eb=(state.eyebrow||'').toUpperCase();
    if('letterSpacing' in ctx) ctx.letterSpacing = Math.round(H*0.0016)+'px';
    const ebPx = roundedFit(eb, 800, H*0.104, maxW);
    ctx.font=`800 ${ebPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
    ctx.fillStyle='#FFFFFF';
    ctx.fillText(eb, W/2, H*0.44);
    if('letterSpacing' in ctx) ctx.letterSpacing='0px';
    if(hasDate){
      const dPx = roundedFit(state.date, 300, H*0.070, maxW);
      ctx.font=`300 ${dPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.fillText(state.date, W/2, H*0.55);
    }

  } else if(hasDate){
    // ---- edge: no title and no type label ----
    const dPx = roundedFit(state.date, 300, H*0.072, maxW);
    ctx.font=`300 ${dPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
    ctx.fillStyle='#FFFFFF';
    ctx.fillText(state.date, W/2, H*0.46);
  }

  // LOGO — white wordmark, centered
  const lw=W*0.150, lh=lw/LOGO_RATIO;
  ctx.drawImage(logo, (W-lw)/2, logoY-lh/2, lw, lh);

  // meta
  document.getElementById('dim').textContent = `${W} \u00d7 ${H}`;
  document.getElementById('fname').textContent = filename();
}

function slug(s){ return (s||'').toLowerCase().replace(/['’]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
function filename(){
  const lead = state.showType ? state.eyebrow : state.title;
  const base = [slug(lead), state.showDate ? slug(state.date) : ''].filter(Boolean).join('-');
  return (base||'quantum-featured-image')+'.png';
}

// wiring
function bindSeg(id, fn){
  document.getElementById(id).addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(c=>c.classList.remove('on'));
    b.classList.add('on'); fn(b); render();
  });
}
document.getElementById('presets').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...e.currentTarget.children].forEach(c=>c.classList.remove('on'));
  b.classList.add('on');
  state.showType = b.dataset.showtype === 'true';
  if(state.showType && b.dataset.eyebrow){
    state.eyebrow=b.dataset.eyebrow;
    document.getElementById('eyebrow').value=state.eyebrow;
  }
  document.getElementById('eyebrowField').style.display = state.showType ? '' : 'none';
  render();
});
bindSeg('theme', b=> state.theme=b.dataset.theme );
bindSeg('bg', b=> state.bg=b.dataset.bg );
bindSeg('size', b=>{ state.w=+b.dataset.w; state.h=+b.dataset.h; });

document.getElementById('eyebrow').addEventListener('input', e=>{ state.eyebrow=e.target.value; render(); });
document.getElementById('date').addEventListener('input', e=>{ state.date=e.target.value; render(); });
document.getElementById('title').addEventListener('input', e=>{ state.title=e.target.value; render(); });
document.getElementById('showTitle').addEventListener('change', e=>{ state.showTitle=e.target.checked; render(); });
document.getElementById('showDate').addEventListener('change', e=>{ state.showDate=e.target.checked; render(); });
document.getElementById('companion').addEventListener('input', e=>{ state.companion=e.target.value; render(); });
document.getElementById('showCompanion').addEventListener('change', e=>{ state.showCompanion=e.target.checked; render(); });

const companionSizeInput=document.getElementById('companionSize');
const companionSizeVal=document.getElementById('companionSizeVal');
companionSizeInput.addEventListener('input', e=>{ state.companionScale=(+e.target.value)/100; companionSizeVal.textContent=e.target.value+'%'; render(); });

const titleSizeInput=document.getElementById('titleSize');
const titleSizeVal=document.getElementById('titleSizeVal');
titleSizeInput.addEventListener('input', e=>{ state.titleScale=(+e.target.value)/100; titleSizeVal.textContent=e.target.value+'%'; render(); });

const bgInput=document.getElementById('bgImgInput');
const bgRemove=document.getElementById('bgImgRemove');
const washWrap=document.getElementById('washWrap');
const washInput=document.getElementById('wash');
const washVal=document.getElementById('washVal');
bgInput.addEventListener('change', e=>{
  const f=e.target.files && e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ const im=new Image(); im.onload=()=>{ bgImg=im; bgRemove.style.display=''; washWrap.style.display=''; render(); }; im.src=r.result; };
  r.readAsDataURL(f);
});
bgRemove.addEventListener('click', ()=>{
  bgImg=null; bgInput.value=''; bgRemove.style.display='none'; washWrap.style.display='none'; render();
});
washInput.addEventListener('input', e=>{ state.bgWash=(+e.target.value)/100; washVal.textContent=e.target.value+'%'; render(); });

document.getElementById('download').addEventListener('click', ()=>{
  canvas.toBlob(b=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download=filename(); a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  },'image/png');
});

document.getElementById('date').value = state.date;
render();
</script>
</body>
</html>
